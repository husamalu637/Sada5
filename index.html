<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدى الطفولة | عدنان ولينا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #ff9800;
            --bg: #0b0f19;
            --card: #161e2e;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            padding: 40px 0;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .main-container {
            max-width: 900px;
            width: 95%;
            margin: 20px auto;
            text-align: center;
        }

        /* منطقة مشغل الفيديو */
        .video-display-area {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            margin-bottom: 30px;
            display: none; /* يظهر عند النقر فقط */
            position: relative;
        }

        .responsive-iframe {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .responsive-iframe iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* شبكة أزرار الحلقات */
        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 15px;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .ep-btn {
            background: #252f44;
            color: white;
            border: 2px solid transparent;
            padding: 15px 0;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .ep-btn:hover {
            background: var(--primary);
            transform: scale(1.1);
            border-color: white;
        }

        .ep-btn.active {
            background: var(--accent);
            color: black;
            box-shadow: 0 0 15px var(--accent);
        }

        .info-text {
            margin-top: 20px;
            color: var(--primary);
            font-size: 1.1rem;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            opacity: 0.4;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>🎬 صدى الطفولة</h1>
    <p>اختر رقم الحلقة وابدأ المشاهدة فوراً</p>
</header>

<div class="main-container">
    
    <div id="videoPlayer" class="video-display-area">
        <div class="responsive-iframe">
            <iframe id="mainIframe" src="" allowfullscreen="" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
        </div>
        <div id="episodeTitle" style="padding: 10px; background: var(--card); font-weight: bold;"></div>
    </div>

    <h2 id="status-msg">اضغط على رقم الحلقة للمشاهدة:</h2>

    <div class="episodes-grid" id="buttonsGrid">
        </div>

    <p class="info-text">جميع الحلقات الـ 26 متوفرة الآن بجودة عالية</p>
</div>

<script>

    const episodes = [
        { n: 1, src: "https://meyon.com.ye/videos/embed/1cb15e94-c5ef-4766-95fb-1d736a545d2e" },

        { n: 5, src: "https://meyon.com.ye/videos/embed/52490adb-e34c-4f79-a0b2-4054d892fc02" },

        { n: 8, src: "https://meyon.com.ye/videos/embed/15cb5150-472c-4554-bbee-66d2dfe8fedf" },

        { n: 13, src: "https://meyon.com.ye/videos/embed/804c60d6-20c5-485a-ab56-d6859b740c1e" },

        { n: 26, src: "https://meyon.com.ye/videos/embed/9b36a743-1c80-439d-a78c-be6559ea10ec" }
    ];

    const grid = document.getElementById('buttonsGrid');
    const player = document.getElementById('videoPlayer');
    const iframe = document.getElementById('mainIframe');
    const titleDisp = document.getElementById('episodeTitle');

    // إنشاء الأزرار تلقائياً
    episodes.forEach(ep => {
        const btn = document.createElement('button');
        btn.className = 'ep-btn';
        btn.innerText = ep.n;
        btn.onclick = function() {
            loadEpisode(ep.n, ep.src, btn);
        };
        grid.appendChild(btn);
    });

    function loadEpisode(num, url, btnElement) {
        // 1. فتح الإعلان (رابطك الخاص)
        window.open('https://www.profitablecpmratenetwork.com/e41dj2h87?key=bef514b5ca3fa945e7a3b60e4a9ef21a', '_blank');

        // 2. تحديث الواجهة
        player.style.display = 'block';
        iframe.src = url;
        titleDisp.innerText = "أنت تشاهد الآن: عدنان ولينا - الحلقة " + num;

        // 3. تمييز الزر النشط
        document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
        btnElement.classList.add('active');

        // 4. التمرير للأعلى لمشاهدة الفيديو
        player.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
</script>

<footer>جميع الحقوق محفوظة - صدى الطفولة &copy; 2026</footer>
</body>
</html>
